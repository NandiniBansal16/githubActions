name: V-Profile DevSecOps Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: githubactionsrepo
  ECS_SERVICE: vprofile-service
  ECS_CLUSTER: gitActions-server
  ECS_TASK_DEFINITION: .aws/task-definition.json
  CONTAINER_NAME: gitActions-server1
  DOCKERFILE_PATH: ./Docker-files/app/multistage/Dockerfile

jobs:
  # PHASE 1: Build Phase
  build-and-test:
    name: Phase 1 - Build & Test
    runs-on: ubuntu-latest
    environment: secret_env
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven Build
        run: mvn clean install -DskipTests

      - name: Upload Workspace for Deployment
        uses: actions/upload-artifact@v4
        with:
          name: workspace-artifact
          path: .

  # PHASE 2: AWS Deployment
  deploy:
    name: Phase 2 - AWS Deployment
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: secret_env
    steps:
      - name: Download Workspace Artifact
        uses: actions/download-artifact@v4
        with:
          name: workspace-artifact

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f ${{ env.DOCKERFILE_PATH }} .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Fill in the new image ID in the ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true