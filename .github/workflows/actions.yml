name: V-Profile Maven Build

on:
  push:
    branches:
      - main
  # This enables the manual "Run workflow" button in the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This ensures we get the code from the branch that triggered the action
          ref: ${{ github.ref }}

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-war-file
          path: target/*.war